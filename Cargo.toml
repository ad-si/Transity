[package]
name = "transity"
version = "0.8.0"
edition = "2021"

[[bin]]
name = "transity"
path = "src/main.rs"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
num-rational = { version = "0.4", features = ["serde"] }
num-bigint = "0.4"
num-traits = "0.2"
colored = "2"
rust_xlsxwriter = "0.7"
anyhow = "1"
wasm-bindgen = "0.2"

[dev-dependencies]
insta = { version = "1", features = ["yaml"] }
